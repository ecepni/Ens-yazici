name: APK Derle

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Sistem paketlerini kur
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses-dev libncursesw5-dev libtinfo6 \
            cmake libffi-dev libssl-dev build-essential ccache libltdl-dev

      - name: Buildozer ve bagimliliklar
        run: |
          python -m pip install --upgrade pip
          pip install "cython<3.0" buildozer

      - name: APK derle
        run: |
          yes | buildozer android debug || buildozer android debug

      - name: APK yukle
        uses: actions/upload-artifact@v4
        with:
          name: ENS-Yazici-APK
          path: bin/*.apk
